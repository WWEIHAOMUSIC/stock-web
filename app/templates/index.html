<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 股票深度分析系统</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root{--bg:#0a0c12;--card:#12151f;--card2:#181c2a;--border:#252a3a;--text:#e4e6ec;--dim:#6b7194;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;--cyan:#06b6d4}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* 导航 */
    .nav{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
    .logo{font-size:16px;font-weight:800;color:var(--orange);white-space:nowrap;letter-spacing:-0.5px}
    .search{flex:1;max-width:420px;position:relative}
    .search input{width:100%;padding:7px 34px 7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;outline:none}
    .search input:focus{border-color:var(--blue)}
    .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);cursor:pointer;font-size:14px}
    .sresults{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:220px;overflow-y:auto;display:none;z-index:200}
    .sresults.show{display:block}
    .sitem{padding:7px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:13px}
    .sitem:hover{background:var(--card2)}
    .sitem .n{font-weight:500}.sitem .c{color:var(--dim);font-size:11px;margin-left:6px}
    .sitem .p{font-weight:700;font-size:12px}
    .p.up{color:var(--red)}.p.dn{color:var(--green)}

    /* 容器 */
    .wrap{max-width:1360px;margin:0 auto;padding:14px}

    /* 股票头 */
    .hdr{display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:14px}
    .hdr.vis{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .hdr .nm{font-size:20px;font-weight:800}.hdr .cd{font-size:12px;color:var(--dim);background:var(--bg);padding:2px 8px;border-radius:4px}
    .hdr .pr{font-size:28px;font-weight:800}
    .hdr .pr.up{color:var(--red)}.hdr .pr.dn{color:var(--green)}
    .hdr .ch{font-size:14px;font-weight:600}
    .hdr .bd{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .bd.up{background:rgba(239,68,68,0.15);color:var(--red)}.bd.dn{background:rgba(34,197,94,0.15);color:var(--green)}
    .hdr .meta{display:flex;gap:14px;font-size:12px;color:var(--dim);flex-wrap:wrap}

    /* 五维评分卡 */
    .dims{display:none;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
    .dims.vis{display:grid}
    @media(max-width:900px){.dims.vis{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:600px){.dims.vis{grid-template-columns:1fr 1fr}}
    .dcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s}
    .dcard:hover{border-color:var(--blue)}
    .dcard .dlabel{font-size:12px;color:var(--dim);font-weight:600;margin-bottom:6px}
    .dcard .dscore{font-size:28px;font-weight:800;line-height:1.1}
    .dcard .dsig{font-size:12px;font-weight:700;margin-top:4px;padding:2px 10px;border-radius:20px;display:inline-block}
    .dsig.bull{background:rgba(34,197,94,0.15);color:var(--green)}
    .dsig.bear{background:rgba(239,68,68,0.15);color:var(--red)}
    .dsig.neut{background:rgba(234,179,8,0.15);color:var(--yellow)}
    .dcard .dicon{font-size:18px;margin-bottom:4px}

    /* 雷达图+核心矛盾 */
    .radar-contr{display:none;grid-template-columns:340px 1fr;gap:12px;margin-bottom:14px}
    .radar-contr.vis{display:grid}
    @media(max-width:900px){.radar-contr.vis{grid-template-columns:1fr}}
    .rcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
    .rcard .rtitle{font-size:13px;font-weight:700;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .rcard .rtitle .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

    /* 核心矛盾 */
    .vs-box{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:600px){.vs-box{grid-template-columns:1fr}}
    .vs-side{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px}
    .vs-side.bull{border-color:rgba(34,197,94,0.3)}.vs-side.bear{border-color:rgba(239,68,68,0.3)}
    .vs-head{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .vs-head.bull{color:var(--green)}.vs-head.bear{color:var(--red)}
    .vs-item{font-size:12px;color:var(--text);padding:4px 0 4px 14px;border-left:2px solid var(--border);margin-bottom:4px;line-height:1.5}
    .vs-side.bull .vs-item{border-color:rgba(34,197,94,0.4)}
    .vs-side.bear .vs-item{border-color:rgba(239,68,68,0.4)}

    .contr-text{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:13px;line-height:1.6}
    .contr-label{font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:6px}

    /* 结论卡 */
    .verdicts{display:none;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .verdicts.vis{display:grid}
    @media(max-width:700px){.verdicts.vis{grid-template-columns:1fr}}
    .vcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
    .vcard .vlabel{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
    .vcard .vdir{font-size:22px;font-weight:800;margin:6px 0}
    .vcard .vtime{font-size:11px;color:var(--dim);margin-bottom:6px}
    .vcard .vlogic{font-size:12px;line-height:1.5;color:var(--text)}

    /* 详细分析 */
    .detail-section{display:none;margin-bottom:14px}
    .detail-section.vis{display:block}
    .dtabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
    .dtab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--dim);background:transparent;border:1px solid var(--border);transition:all .2s}
    .dtab:hover{color:var(--text);background:var(--card2)}
    .dtab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .dpanel{display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
    .dpanel.active{display:block}

    .detail-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
    .detail-row:last-child{border-bottom:none}
    .detail-row .tag{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;min-width:36px;text-align:center}
    .tag.bull{background:rgba(34,197,94,0.15);color:var(--green)}
    .tag.bear{background:rgba(239,68,68,0.15);color:var(--red)}
    .tag.neutral{background:rgba(234,179,8,0.15);color:var(--yellow)}
    .tag.info{background:rgba(59,130,246,0.15);color:var(--blue)}

    /* K线图 */
    .kline-box{width:100%;height:380px}

    /* 新闻列表 */
    .news-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
    .news-item:last-child{border-bottom:none}
    .news-item .nt{font-weight:600;margin-bottom:2px}
    .news-item .nm{color:var(--dim);font-size:11px}

    /* 空状态 */
    .empty{text-align:center;padding:60px 20px;color:var(--dim)}
    .empty .icon{font-size:48px;margin-bottom:12px}
    .empty .txt{font-size:14px}

    /* 免责 */
    .disclaimer{text-align:center;color:var(--dim);font-size:11px;padding:16px;margin-top:10px}

    /* 加载 */
    .loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--dim)}
    .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<nav class="nav">
  <div class="logo">📊 深度分析</div>
  <div class="search">
    <input type="text" id="si" placeholder="输入代码或名称，如 002073 / 软控 / 贵州茅台" autocomplete="off">
    <span class="search-icon" onclick="doSearch()">🔍</span>
    <div class="sresults" id="sr"></div>
  </div>
</nav>

<div class="wrap">
  <!-- 股票头 -->
  <div class="hdr" id="hdr">
    <span class="nm" id="hNm">—</span>
    <span class="cd" id="hCd">------</span>
    <span class="pr" id="hPr">—</span>
    <span class="ch" id="hCh">—</span>
    <span class="bd" id="hBd">—</span>
    <div class="meta" id="hMeta"></div>
  </div>

  <!-- 空状态 -->
  <div class="empty" id="emptyState">
    <div class="icon">📈</div>
    <div class="txt">搜索股票代码或名称，开始五维深度分析</div>
  </div>

  <!-- 五维评分卡 -->
  <div class="dims" id="dims">
    <div class="dcard" onclick="showDetail('tech')">
      <div class="dicon">📐</div>
      <div class="dlabel">技术面</div>
      <div class="dscore" id="sTech">—</div>
      <div class="dsig" id="sigTech">—</div>
    </div>
    <div class="dcard" onclick="showDetail('capital')">
      <div class="dicon">💰</div>
      <div class="dlabel">资金面</div>
      <div class="dscore" id="sCap">—</div>
      <div class="dsig" id="sigCap">—</div>
    </div>
    <div class="dcard" onclick="showDetail('msg')">
      <div class="dicon">📰</div>
      <div class="dlabel">消息面</div>
      <div class="dscore" id="sMsg">—</div>
      <div class="dsig" id="sigMsg">—</div>
    </div>
    <div class="dcard" onclick="showDetail('policy')">
      <div class="dicon">🏛️</div>
      <div class="dlabel">政策面</div>
      <div class="dscore" id="sPol">—</div>
      <div class="dsig" id="sigPol">—</div>
    </div>
    <div class="dcard" onclick="showDetail('sent')">
      <div class="dicon">🧠</div>
      <div class="dlabel">情绪面</div>
      <div class="dscore" id="sSent">—</div>
      <div class="dsig" id="sigSent">—</div>
    </div>
  </div>

  <!-- 雷达图+核心矛盾 -->
  <div class="radar-contr" id="radarContr">
    <div class="rcard">
      <div class="rtitle"><span class="dot" style="background:var(--cyan)"></span>五维雷达</div>
      <div id="radarChart" style="width:100%;height:300px"></div>
    </div>
    <div class="rcard">
      <div class="rtitle"><span class="dot" style="background:var(--orange)"></span>核心矛盾提炼</div>
      <div class="vs-box">
        <div class="vs-side bull">
          <div class="vs-head bull">🟢 多头观点</div>
          <div id="bullPoints"></div>
        </div>
        <div class="vs-side bear">
          <div class="vs-head bear">🔴 空头观点</div>
          <div id="bearPoints"></div>
        </div>
      </div>
      <div class="contr-text">
        <div class="contr-label">⚡ 核心矛盾</div>
        <div id="contrText">—</div>
      </div>
    </div>
  </div>

  <!-- 短期/中期结论 -->
  <div class="verdicts" id="verdicts">
    <div class="vcard">
      <div class="vlabel">📅 短期结论 (1-3天)</div>
      <div class="vdir" id="shortDir">—</div>
      <div class="vtime" id="shortTime"></div>
      <div class="vlogic" id="shortLogic">—</div>
    </div>
    <div class="vcard">
      <div class="vlabel">📆 中期结论 (1-4周)</div>
      <div class="vdir" id="midDir">—</div>
      <div class="vtime" id="midTime"></div>
      <div class="vlogic" id="midLogic">—</div>
    </div>
  </div>

  <!-- 详细分析 -->
  <div class="detail-section" id="detailSec">
    <div class="dtabs">
      <button class="dtab active" onclick="showDetail('tech')">📐 技术面</button>
      <button class="dtab" onclick="showDetail('capital')">💰 资金面</button>
      <button class="dtab" onclick="showDetail('msg')">📰 消息面</button>
      <button class="dtab" onclick="showDetail('policy')">🏛️ 政策面</button>
      <button class="dtab" onclick="showDetail('sent')">🧠 情绪面</button>
      <button class="dtab" onclick="showDetail('kline')">📉 K线图</button>
    </div>
    <div class="dpanel active" id="dp-tech"><div id="detTech"></div></div>
    <div class="dpanel" id="dp-capital"><div id="detCap"></div></div>
    <div class="dpanel" id="dp-msg"><div id="detMsg"></div></div>
    <div class="dpanel" id="dp-policy"><div id="detPol"></div></div>
    <div class="dpanel" id="dp-sent"><div id="detSent"></div></div>
    <div class="dpanel" id="dp-kline"><div id="klineChart" class="kline-box"></div></div>
  </div>

  <div class="disclaimer">⚠️ 本系统数据仅供参考，不构成任何投资建议。股市有风险，决策需谨慎。</div>
</div>

<script>
let curCode='', curName='', radarChart=null, kChart=null, analysisData=null;

// ── 搜索 ──
const si=document.getElementById('si'), sr=document.getElementById('sr');
si.addEventListener('input',debounce(async e=>{
  const q=e.target.value.trim(); if(!q){sr.classList.remove('show');return}
  try{
    const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const d=await r.json();
    if(!d.length){sr.classList.remove('show');return}
    sr.innerHTML=d.map(s=>`<div class="sitem" onclick="pick('${s['代码']}','${s['名称']}')"><span><span class="n">${s['名称']}</span><span class="c">${s['代码']}</span></span><span class="p ${s['涨跌幅']>=0?'up':'dn'}">${s['涨跌幅']>=0?'+':''}${(s['涨跌幅']||0).toFixed(2)}%</span></div>`).join('');
    sr.classList.add('show');
  }catch(e){console.error(e)}
},300));
function debounce(f,d){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>f(...a),d)}}
function doSearch(){const q=si.value.trim();if(q)pick(q.replace(/\D/g,'').slice(0,6),q)}

async function pick(code,name){
  code=code.replace(/[^0-9]/g,'').slice(0,6);if(!code)return;
  sr.classList.remove('show');curCode=code;curName=name;
  si.value=`${name} (${code})`;
  document.getElementById('emptyState').style.display='none';
  await loadAnalysis();
}

// ── 主分析 ──
async function loadAnalysis(){
  show('dims','radarContr','verdicts','detailSec');
  document.getElementById('hdr').classList.add('vis');
  // 显示加载
  document.querySelectorAll('.dscore').forEach(e=>e.textContent='···');

  try{
    const r=await fetch(`/api/analysis/${curCode}`);
    analysisData=await r.json();
    renderAll(analysisData);
  }catch(e){
    console.error(e);
  }
}

function show(...ids){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('vis')})}

function renderAll(d){
  const q=d['股票'];
  // 头部
  const pct=parseFloat(q['涨跌幅']||0), isUp=pct>=0;
  document.getElementById('hNm').textContent=q['名称']||curName;
  document.getElementById('hCd').textContent=curCode;
  const prEl=document.getElementById('hPr');
  prEl.textContent=q['最新价']?`¥${parseFloat(q['最新价']).toFixed(2)}`:'—';
  prEl.className=`pr ${isUp?'up':'dn'}`;
  document.getElementById('hCh').innerHTML=`${isUp?'▲':'▼'} ${Math.abs(pct).toFixed(2)}% ${isUp?'+':''}${(parseFloat(q['涨跌额'])||0).toFixed(2)}`;
  document.getElementById('hCh').style.color=isUp?'var(--red)':'var(--green)';
  const bd=document.getElementById('hBd');bd.textContent=isUp?'涨':'跌';bd.className=`bd ${isUp?'up':'dn'}`;
  document.getElementById('hMeta').innerHTML=`
    <span>今开 ${q['今开']||'—'}</span><span>最高 ${q['最高']||'—'}</span><span>最低 ${q['最低']||'—'}</span>
    <span>昨收 ${q['昨收']||'—'}</span><span>成交 ${q['成交额亿']?q['成交额亿']+'亿':'—'}</span><span>市场 ${q['市场']||'—'}</span>
  `;

  // 五维评分
  renderScore('sTech','sigTech',d['技术面']);
  renderScore('sCap','sigCap',d['资金面']);
  renderScore('sMsg','sigMsg',d['消息面']);
  renderScore('sPol','sigPol',d['政策面']);
  renderScore('sSent','sigSent',d['情绪面']);

  // 雷达图
  renderRadar(d);

  // 核心矛盾
  const c=d['综合'];
  document.getElementById('bullPoints').innerHTML=c['多头观点'].map(p=>`<div class="vs-item">${p}</div>`).join('');
  document.getElementById('bearPoints').innerHTML=c['空头观点'].map(p=>`<div class="vs-item">${p}</div>`).join('');
  document.getElementById('contrText').textContent=c['核心矛盾'];

  // 结论
  const sh=c['短期'],mh=c['中期'];
  document.getElementById('shortDir').textContent=sh['方向'];
  document.getElementById('shortDir').style.color=dirColor(sh['方向']);
  document.getElementById('shortTime').textContent=sh['时间'];
  document.getElementById('shortLogic').textContent=sh['逻辑'];
  document.getElementById('midDir').textContent=mh['方向'];
  document.getElementById('midDir').style.color=dirColor(mh['方向']);
  document.getElementById('midTime').textContent=mh['时间'];
  document.getElementById('midLogic').textContent=mh['逻辑'];

  // 详细
  renderDetails('detTech',d['技术面']['details']);
  renderDetails('detCap',d['资金面']['details']);
  renderDetails('detMsg',d['消息面']['details'],d['消息面']['新闻']);
  renderDetails('detPol',d['政策面']['details']);
  renderDetails('detSent',d['情绪面']['details']);

  // K线
  if(d['K线历史']&&d['K线历史'].length>0) renderKline(d['K线历史']);
}

function renderScore(scoreId,sigId,dim){
  const s=dim['score'],sig=dim['signal'];
  document.getElementById(scoreId).textContent=s;
  document.getElementById(scoreId).style.color=s>=60?'var(--green)':s<=40?'var(--red)':'var(--yellow)';
  const sigEl=document.getElementById(sigId);
  sigEl.textContent=sig;
  sigEl.className=`dsig ${sig==='偏多'?'bull':sig==='偏空'?'bear':'neut'}`;
}

function dirColor(dir){return dir==='偏多'?'var(--green)':dir==='偏空'?'var(--red)':'var(--yellow)'}

function renderRadar(d){
  const el=document.getElementById('radarChart');
  if(radarChart)radarChart.dispose();
  radarChart=echarts.init(el);
  radarChart.setOption({
    backgroundColor:'transparent',
    radar:{indicator:[
      {name:'技术面',max:100},{name:'资金面',max:100},{name:'消息面',max:100},{name:'政策面',max:100},{name:'情绪面',max:100}
    ],radius:'65%',axisName:{color:'#6b7194',fontSize:11},splitArea:{areaStyle:{color:['rgba(59,130,246,0.02)','rgba(59,130,246,0.05)']}},splitLine:{lineStyle:{color:'#252a3a'}},axisLine:{lineStyle:{color:'#252a3a'}}},
    series:[{type:'radar',data:[{value:[d['技术面']['score'],d['资金面']['score'],d['消息面']['score'],d['政策面']['score'],d['情绪面']['score']],
      areaStyle:{color:'rgba(59,130,246,0.2)'},lineStyle:{color:'#3b82f6',width:2},itemStyle:{color:'#3b82f6'},symbol:'circle',symbolSize:6}]}]
  });
}

function renderDetails(containerId,details,news){
  const el=document.getElementById(containerId);
  let html=details.map(d=>{
    const cls=d['type']==='bull'?'bull':d['type']==='bear'?'bear':d['type']==='info'?'info':'neutral';
    const label=d['type']==='bull'?'多':d['type']==='bear'?'空':d['type']==='info'?'注':'中';
    return `<div class="detail-row"><span class="tag ${cls}">${label}</span><span>${d['item']}</span></div>`;
  }).join('');
  if(news&&news.length>0){
    html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:12px;font-weight:700;color:var(--dim);margin-bottom:8px">📎 相关新闻</div>`;
    html+=news.map(n=>`<div class="news-item"><div class="nt">${n['标题']}</div><div class="nm">${n['来源']||''} ${n['时间']||''}</div></div>`).join('');
    html+='</div>';
  }
  el.innerHTML=html||'<div style="color:var(--dim);padding:12px">暂无分析数据</div>';
}

function renderKline(kline){
  const el=document.getElementById('klineChart');
  if(kChart)kChart.dispose();
  kChart=echarts.init(el);
  const dates=kline.map(k=>k['date'].slice(5));
  const ohlc=kline.map(k=>[k['open'],k['close'],k['low'],k['high']]);
  const vols=kline.map(k=>k['volume']);
  const colors=kline.map(k=>k['pct']>=0?'#ef4444':'#22c55e');
  kChart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
    grid:[{left:'8%',right:'3%',top:'8%',height:'55%'},{left:'8%',right:'3%',top:'68%',height:'18%'}],
    xAxis:[{type:'category',data:dates,gridIndex:0,axisLine:{lineStyle:{color:'#252a3a'}},axisLabel:{color:'#6b7194',fontSize:9},splitLine:{show:true,lineStyle:{color:'#12151f'}},boundaryGap:true},
           {type:'category',data:dates,gridIndex:1,axisLine:{lineStyle:{color:'#252a3a'}},axisLabel:{color:'#6b7194',fontSize:9},boundaryGap:true}],
    yAxis:[{scale:true,gridIndex:0,axisLine:{lineStyle:{color:'#252a3a'}},axisLabel:{color:'#6b7194',fontSize:9},splitLine:{lineStyle:{color:'#12151f'}},splitNumber:4},
           {scale:true,gridIndex:1,axisLine:{lineStyle:{color:'#252a3a'}},axisLabel:{color:'#6b7194',fontSize:9},splitLine:{show:false}}],
    series:[
      {name:'K线',type:'candlestick',data:ohlc,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:'#ef4444',color0:'#22c55e',borderColor:'#ef4444',borderColor0:'#22c55e'}},
      {name:'量',type:'bar',data:vols,xAxisIndex:1,yAxisIndex:1,itemStyle:{color:p=>colors[p.dataIndex]},barMaxWidth:5}
    ]
  });
}

// ── 标签切换 ──
function showDetail(name){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.dpanel').forEach(p=>p.classList.remove('active'));
  const tabMap={tech:'📐 技术面',capital:'💰 资金面',msg:'📰 消息面',policy:'🏛️ 政策面',sent:'🧠 情绪面',kline:'📉 K线图'};
  document.querySelectorAll('.dtab').forEach(t=>{if(t.textContent===tabMap[name])t.classList.add('active')});
  const panel=document.getElementById(`dp-${name}`);
  if(panel)panel.classList.add('active');
  if(name==='kline'&&kChart)setTimeout(()=>kChart.resize(),50);
}

window.addEventListener('resize',()=>{if(radarChart)radarChart.resize();if(kChart)kChart.resize()});
